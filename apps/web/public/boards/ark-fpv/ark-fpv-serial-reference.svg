<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">ARK FPV serial reference</title>
  <desc id="desc">Compact reference table mapping ARK FPV serial parameters to hardware ports and typical connector roles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101923" />
      <stop offset="100%" stop-color="#080d12" />
    </linearGradient>
    <style>
      .title { fill: #edf4f7; font: 700 24px 'IBM Plex Sans', sans-serif; letter-spacing: 0.06em; text-transform: uppercase; }
      .copy { fill: #b6c2ca; font: 16px 'IBM Plex Sans', sans-serif; }
      .head { fill: #8ec3d4; font: 700 15px 'IBM Plex Sans', sans-serif; letter-spacing: 0.08em; text-transform: uppercase; }
      .cell { fill: #e5ecef; font: 16px 'IBM Plex Sans', sans-serif; }
      .muted { fill: #9fb0ba; font: 15px 'IBM Plex Sans', sans-serif; }
    </style>
  </defs>
  <rect width="960" height="600" fill="url(#bg)" />
  <text x="64" y="74" class="title">ARK FPV Serial Roles</text>
  <text x="64" y="108" class="copy">Default SERIAL mapping used by the hardware-aware Ports tab.</text>

  <rect x="64" y="150" width="832" height="54" rx="16" fill="#13212c" stroke="#355063" />
  <text x="96" y="184" class="head">Parameter</text>
  <text x="294" y="184" class="head">Hardware Port</text>
  <text x="516" y="184" class="head">Named Connector</text>
  <text x="760" y="184" class="head">Typical Use</text>

  <g transform="translate(64 216)">
    <rect width="832" height="308" rx="22" fill="#0f171f" stroke="#2c404e" />
    <g class="cell">
      <text x="32" y="42">SERIAL0</text><text x="230" y="42">OTG1</text><text x="452" y="42">USB</text><text x="650" y="42">Bench setup, MAVLink</text>
      <text x="32" y="80">SERIAL1</text><text x="230" y="80">UART7</text><text x="452" y="80">Telem 1</text><text x="650" y="80">Telemetry radio</text>
      <text x="32" y="118">SERIAL2</text><text x="230" y="118">UART5</text><text x="452" y="118">Telem 2 / VTX</text><text x="650" y="118">MSP, VTX, spare serial</text>
      <text x="32" y="156">SERIAL3</text><text x="230" y="156">USART1</text><text x="452" y="156">GPS</text><text x="650" y="156">Primary GNSS</text>
      <text x="32" y="194">SERIAL4</text><text x="230" y="194">UART8</text><text x="452" y="194">GPS2</text><text x="650" y="194">Second GNSS or spare</text>
      <text x="32" y="232">SERIAL5</text><text x="230" y="232">USART2</text><text x="452" y="232">Telem 3 / VTX</text><text x="650" y="232">Peripheral or video control</text>
      <text x="32" y="270">SERIAL6</text><text x="230" y="270">UART4</text><text x="452" y="270">PWM / UART4</text><text x="650" y="270">ESC telemetry, user serial</text>
      <text x="32" y="308">SERIAL7</text><text x="230" y="308">USART3</text><text x="452" y="308">Debug</text><text x="650" y="308">Console / logs</text>
      <text x="32" y="346">SERIAL8</text><text x="230" y="346">USART6</text><text x="452" y="346">RC</text><text x="650" y="346">CRSF / ELRS / SBUS</text>
    </g>

    <g stroke="#223441" stroke-width="1">
      <line x1="24" y1="56" x2="808" y2="56" />
      <line x1="24" y1="94" x2="808" y2="94" />
      <line x1="24" y1="132" x2="808" y2="132" />
      <line x1="24" y1="170" x2="808" y2="170" />
      <line x1="24" y1="208" x2="808" y2="208" />
      <line x1="24" y1="246" x2="808" y2="246" />
      <line x1="24" y1="284" x2="808" y2="284" />
      <line x1="24" y1="322" x2="808" y2="322" />
    </g>
  </g>

  <text x="64" y="560" class="muted">Use the Ports rows for live protocol, baud, and options edits. This card is for connector lookup only.</text>
</svg>
