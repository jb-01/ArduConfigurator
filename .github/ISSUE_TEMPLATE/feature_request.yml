name: Feature request
description: Propose a product or engineering improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user or engineering problem does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the change as concretely as possible.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: constraints
    attributes:
      label: Safety / compatibility constraints
      description: Note any impacts on live-aircraft safety, expressivity, or browser-first direction.
  - type: textarea
    id: validation
    attributes:
      label: How should this be validated?
      description: Mock, replay, SITL, live FC, screenshots, etc.
